{% extends 'base.html' %}

{% block title %}Vérification MFA{% endblock %}

{% block content %}
<section class="login-page">
  <div class="simple-card login-card">
    <h1>Vérification MFA</h1>
    <p class="text-muted">Saisissez le code à 6 chiffres.</p>

    <div class="small text-muted mb-3">Expiration dans <span id="otpCountdown" data-otp-seconds="{{ otp_seconds }}">{{ otp_seconds }}</span> secondes</div>

    <form method="post" id="otpForm">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <label for="otpInput" class="form-label">Code OTP</label>
      <input id="otpInput" name="otp" class="form-control otp-input" maxlength="6" pattern="\d{6}" inputmode="numeric" required>
      <button class="btn btn-primary w-100 mt-3">Vérifier</button>
    </form>

    <p class="small text-muted mt-3 mb-0">Le code OTP se trouve dans votre boite mail.</p>
  </div>
</section>
{% endblock %}
